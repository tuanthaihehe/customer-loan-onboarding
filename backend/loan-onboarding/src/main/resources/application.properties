spring.application.name=loan-onboarding
server.port=${SERVER_PORT:8080}

# Mặc định dùng database thật.
spring.profiles.default=db

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# FPT AI - ID Recognition (OCR)
# Tài liệu: https://docs.fpt.ai/vision/idr/vnm
# PRODUCTION: override bằng biến môi trường FPTAI_API_KEY thay vì lưu key trực tiếp
fptai.ocr.api-url=https://api.fpt.ai/vision/idr/vnm/
fptai.ocr.api-key=${FPTAI_API_KEY:lqC33wLZQ9ILpTjRuV32W3zTWSDSOFtd}

# Multipart upload — giới hạn 5MB theo quy định FPT AI
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=12MB
