# DB profile: chỉ dùng khi ERD/schema đã sẵn sàng hoặc cần test mapping thật.
# Chạy với: mvnw spring-boot:run -Dspring-boot.run.profiles=db -Dspring-boot.run.jvmArguments="-DDB_PASSWORD=<yourpassword>"
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/loan_onboarding}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.encoding=UTF-8
